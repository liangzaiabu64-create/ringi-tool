<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>稟議書 作成ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>if(window.pdfjsLib){pdfjsLib.GlobalWorkerOptions.workerSrc="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js";}</script>
<script src="https://cdn.jsdelivr.net/pyodide/v0.26.2/full/pyodide.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;500;700;900&family=Shippori+Mincho:wght@500;600;700&display=swap');
  :root{
    --ink:#16263a;--ink-soft:#3d5168;--navy:#1b3a5b;--navy-deep:#102438;
    --paper:#faf8f3;--paper-line:#ece6da;--card:#fff;
    --go:#2d7d5a;--go-deep:#236147;--go-soft:#e7f2ec;
    --amber:#b5731a;--amber-soft:#fbf2e2;--amber-line:#ecdcbd;
    --violet:#5b4b8a;--violet-soft:#efeaf6;--violet-line:#d8cdeb;
    --edge:#dcd5c8;--edge-strong:#c5bba8;
    --shadow:0 1px 2px rgba(16,36,56,.06),0 8px 28px rgba(16,36,56,.08);
    --shadow-lg:0 4px 12px rgba(16,36,56,.1),0 24px 60px rgba(16,36,56,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Zen Kaku Gothic New',sans-serif;color:var(--ink);background:var(--paper);line-height:1.6;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1240px;margin:0 auto;padding:0 24px}
  .top{background:linear-gradient(180deg,var(--navy-deep),var(--navy));color:#fff;padding:24px 0 20px;position:relative;overflow:hidden}
  .top::after{content:"";position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent 0 38px,rgba(255,255,255,.025) 38px 39px);pointer-events:none}
  .top .wrap{position:relative;display:flex;align-items:center;gap:16px}
  .mark{width:42px;height:42px;border-radius:9px;background:#fff;color:var(--navy);display:grid;place-items:center;flex:none;font-family:'Shippori Mincho',serif;font-weight:700;font-size:22px;box-shadow:0 4px 14px rgba(0,0,0,.25)}
  .top h1{font-family:'Shippori Mincho',serif;font-weight:700;font-size:20px;letter-spacing:.06em;line-height:1.2}
  .top p{font-size:12px;color:#bcd0e4;letter-spacing:.04em;margin-top:2px}
  .top .right{margin-left:auto;display:flex;align-items:center;gap:10px}
  .badge{font-size:11px;letter-spacing:.06em;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);padding:5px 12px;border-radius:99px;color:#dce8f4}
  .gear{width:34px;height:34px;border-radius:9px;border:1px solid rgba(255,255,255,.25);background:rgba(255,255,255,.1);color:#fff;cursor:pointer;display:grid;place-items:center;transition:.15s}
  .gear:hover{background:rgba(255,255,255,.2)}
  .gear.active{background:#fff;color:var(--navy)}
  .gear .dot{position:absolute;width:8px;height:8px;border-radius:99px;background:var(--go);transform:translate(11px,-11px);border:1.5px solid var(--navy-deep)}
  .boot{position:fixed;inset:0;background:linear-gradient(180deg,#fbf9f4,#f3efe6);display:grid;place-items:center;z-index:100;transition:opacity .5s}
  .boot.hide{opacity:0;pointer-events:none}
  .boot-card{text-align:center;max-width:400px;padding:0 24px}
  .boot .spin{width:48px;height:48px;margin:0 auto 22px;border:4px solid #e3ddd0;border-top-color:var(--navy);border-radius:99px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .boot h2{font-family:'Shippori Mincho',serif;font-size:20px;color:var(--navy);font-weight:700}
  .boot p{font-size:13px;color:var(--ink-soft);margin-top:10px;line-height:1.7}
  .boot .pct{margin-top:14px;font-family:ui-monospace,monospace;font-size:12px;color:#9a9486}
  .boot .bar{margin-top:8px;height:4px;background:#e3ddd0;border-radius:99px;overflow:hidden}
  .boot .bar i{display:block;height:100%;background:var(--navy);width:0;transition:width .4s}
  main{padding:22px 0 70px}

  /* settings panel */
  .settings{background:var(--card);border:1px solid var(--edge);border-radius:14px;box-shadow:var(--shadow);margin-bottom:20px;overflow:hidden;animation:slideIn .3s}
  @keyframes slideIn{from{opacity:0;transform:translateY(-6px)}}
  .settings-h{padding:14px 20px;background:linear-gradient(180deg,#fcfbf8,#f7f4ec);border-bottom:1px solid var(--paper-line);display:flex;align-items:center;gap:10px}
  .settings-h .ic{width:28px;height:28px;border-radius:8px;background:var(--violet);color:#fff;display:grid;place-items:center;flex:none}
  .settings-h h3{font-size:14.5px;font-weight:700}
  .settings-h .x{margin-left:auto;background:none;border:none;font-size:20px;color:#9a9486;cursor:pointer;line-height:1}
  .settings-b{padding:20px}
  .modeswitch{display:flex;gap:10px;margin-bottom:18px}
  .modecard{flex:1;border:1.5px solid var(--edge);border-radius:11px;padding:14px;cursor:default;position:relative;background:#fcfbf8}
  .modecard.on{border-color:var(--go);background:var(--go-soft)}
  .modecard .mt{font-size:13px;font-weight:700;display:flex;align-items:center;gap:7px}
  .modecard .mt .pill{font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:#e3ddce;color:#8a8270}
  .modecard.on .mt .pill{background:var(--go);color:#fff}
  .modecard p{font-size:11.5px;color:var(--ink-soft);margin-top:6px;line-height:1.5}
  .keyrow{margin-top:4px}
  .keyrow label{display:block;font-size:12px;font-weight:700;color:var(--violet);margin-bottom:7px}
  .keyinput{display:flex;gap:9px}
  .keyinput input{flex:1;border:1px solid #d8cdeb;border-radius:9px;padding:10px 12px;font-family:ui-monospace,monospace;font-size:13px;background:#fff}
  .keyinput input:focus{outline:none;border-color:var(--violet);box-shadow:0 0 0 3px rgba(91,75,138,.1)}
  .keyinput button{border:none;border-radius:9px;padding:0 18px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;transition:.15s}
  .ksave{background:var(--violet);color:#fff}.ksave:hover{background:#4a3d73}
  .kclear{background:#f2ece2;color:#b0654f}.kclear:hover{background:#c0392b;color:#fff}
  .keynote{font-size:11px;color:#8a7fa6;margin-top:10px;line-height:1.6;background:var(--violet-soft);border:1px solid var(--violet-line);border-radius:9px;padding:10px 13px}
  .keynote b{color:var(--violet)}
  .keystate{display:inline-flex;align-items:center;gap:6px;font-size:11.5px;font-weight:700;padding:4px 11px;border-radius:99px;margin-bottom:14px}
  .keystate.on{background:var(--go-soft);color:var(--go-deep)}
  .keystate.off{background:#f3efe6;color:#9a8a6a}

  .layout{display:grid;grid-template-columns:1fr 0.95fr;gap:26px;align-items:start}
  @media(max-width:940px){.layout{grid-template-columns:1fr}}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;box-shadow:var(--shadow);overflow:hidden}
  .card-h{padding:14px 20px;border-bottom:1px solid var(--paper-line);background:#fcfbf8;display:flex;align-items:center;gap:10px}
  .card-h .step{width:24px;height:24px;border-radius:99px;background:var(--navy);color:#fff;display:grid;place-items:center;font-size:12px;font-weight:700;flex:none}
  .card-h h3{font-size:14.5px;font-weight:700;letter-spacing:.02em}
  .card-h .hint{margin-left:auto;font-size:11.5px;color:#9a9486}

  /* upload zone (only when key set) */
  .uploadzone{margin:18px 20px 0;border:2px dashed var(--violet-line);background:var(--violet-soft);border-radius:12px;padding:20px;text-align:center;cursor:pointer;transition:.2s;animation:slideIn .3s}
  .uploadzone:hover,.uploadzone.hot{border-color:var(--violet);background:#eae3f4}
  .uploadzone .ic{width:46px;height:46px;margin:0 auto 11px;border-radius:11px;background:linear-gradient(150deg,#e5ddf2,#d6c9eb);display:grid;place-items:center;color:var(--violet)}
  .uploadzone h4{font-size:14px;font-weight:700;color:#4a3d73}
  .uploadzone .sub{font-size:12px;color:#8a7fa6;margin-top:5px}
  .uploadzone .badge2{display:inline-block;margin-top:11px;font-size:10.5px;font-weight:700;color:#fff;background:var(--violet);padding:3px 11px;border-radius:99px;letter-spacing:.04em}
  .uthumbs{display:flex;gap:9px;flex-wrap:wrap;justify-content:center;margin-top:13px}
  .uthumb{position:relative;width:74px}
  .uthumb img{width:74px;height:60px;object-fit:cover;border-radius:7px;border:1px solid var(--violet-line);background:#fff}
  .uthumb .pdf{width:74px;height:60px;border-radius:7px;border:1px solid var(--violet-line);background:#fff;display:grid;place-items:center;color:#9a7fa6;font-size:10px;font-weight:700}
  .uthumb .x{position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:99px;border:none;background:var(--violet);color:#fff;cursor:pointer;font-size:12px;line-height:1}
  .uact{display:flex;gap:9px;justify-content:center;margin-top:13px;flex-wrap:wrap}
  .btn-extract{background:linear-gradient(160deg,var(--violet),#4a3d73);color:#fff;border:none;border-radius:9px;padding:10px 22px;font-family:inherit;font-weight:700;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:.2s}
  .btn-extract:not(:disabled):hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(91,75,138,.3)}
  .btn-extract:disabled{opacity:.5;cursor:not-allowed}
  .uextra{font-size:11px;color:#8a7fa6;background:none;border:none;cursor:pointer;text-decoration:underline}
  .extracting{display:flex;align-items:center;gap:10px;justify-content:center;padding:6px 0;color:var(--violet);font-size:13px;font-weight:700}
  .miniSpin{width:18px;height:18px;border:3px solid #d8cdeb;border-top-color:var(--violet);border-radius:99px;animation:sp .8s linear infinite}

  .form{padding:20px}
  .fg{margin-bottom:18px}.fg:last-child{margin-bottom:0}
  .fg>label{display:block;font-size:12px;font-weight:700;color:var(--navy);letter-spacing:.02em;margin-bottom:7px}
  .fg .src{display:inline-block;font-size:9.5px;font-weight:700;color:#fff;background:var(--violet);padding:1px 7px;border-radius:5px;margin-left:7px;vertical-align:middle}
  .fld{width:100%;border:1px solid var(--edge);border-radius:9px;padding:10px 12px;font-family:inherit;font-size:13.5px;color:var(--ink);background:#fff;transition:.15s}
  .fld:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 3px rgba(27,58,91,.1)}
  textarea.fld{resize:vertical;min-height:92px;line-height:1.7}
  .fld::placeholder{color:#b3aa98}
  .reasontools{display:flex;justify-content:flex-end;margin-top:6px}
  .relink{font-size:11.5px;font-weight:700;color:var(--violet);background:none;border:none;cursor:pointer;display:inline-flex;align-items:center;gap:5px}
  .relink:hover{text-decoration:underline}.relink:disabled{opacity:.5;cursor:default}
  .items-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
  .items-h label{font-size:12px;font-weight:700;color:var(--navy);margin:0}
  .addrow{font-size:11.5px;font-weight:700;color:var(--navy);background:none;border:1px dashed var(--edge-strong);border-radius:7px;padding:5px 11px;cursor:pointer;transition:.15s}
  .addrow:hover{background:#f4f7fa;border-color:var(--navy)}
  .item{background:#fbfaf7;border:1px solid var(--edge);border-radius:10px;padding:12px;margin-bottom:10px;position:relative}
  .item .stack{display:flex;flex-direction:column;gap:9px}
  .item .row3{display:grid;grid-template-columns:1fr 1fr 1.2fr;gap:9px}
  .mini{font-size:10px;color:#9a9486;font-weight:700;margin-bottom:4px;display:block;letter-spacing:.02em}
  .delrow{position:absolute;top:10px;right:10px;width:22px;height:22px;border-radius:6px;border:none;background:#f2ece2;color:#b0654f;cursor:pointer;font-size:13px;line-height:1}
  .delrow:hover{background:#c0392b;color:#fff}
  .sumline{display:flex;justify-content:flex-end;gap:18px;padding:11px 14px;background:var(--navy);color:#fff;border-radius:9px;font-size:13px;flex-wrap:wrap;align-items:center}
  .sumline b{font-size:15px}.sumline .tax{color:#bcd0e4}
  .sumline .flag{margin-right:auto;font-size:11px;font-weight:700;padding:3px 10px;border-radius:99px;background:rgba(255,255,255,.15)}
  .sumline .flag.hot{background:var(--amber);color:#fff}
  .rowset{display:flex;flex-direction:column;gap:8px}
  .rowset .row2{display:grid;grid-template-columns:1.3fr .9fr;gap:9px;align-items:center;position:relative}
  .rowset .row1{position:relative}
  .delmini{position:absolute;top:50%;right:-26px;transform:translateY(-50%);width:20px;height:20px;border-radius:5px;border:none;background:#f2ece2;color:#b0654f;cursor:pointer;font-size:12px;line-height:1}
  .delmini:hover{background:#c0392b;color:#fff}
  .addmini{font-size:11px;font-weight:700;color:var(--navy);background:none;border:1px dashed var(--edge-strong);border-radius:6px;padding:4px 10px;cursor:pointer;align-self:flex-start;margin-top:2px}
  .addmini:hover{background:#f4f7fa}
  .order-sec{margin:18px 0 0;border:1px solid var(--amber-line);background:var(--amber-soft);border-radius:12px;overflow:hidden;animation:slideIn .35s}
  .order-sec .osh{padding:11px 16px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--amber-line)}
  .order-sec .osh .ic{width:26px;height:26px;border-radius:7px;background:var(--amber);color:#fff;display:grid;place-items:center;flex:none}
  .order-sec .osh .t{font-size:13px;font-weight:700;color:#8a5a14}
  .order-sec .osh .tag{margin-left:auto;font-size:10.5px;font-weight:700;color:#fff;background:var(--amber);padding:3px 10px;border-radius:99px}
  .order-sec .osb{padding:16px}
  .order-sec .ogrid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  @media(max-width:560px){.order-sec .ogrid{grid-template-columns:1fr}}
  .order-sec label{display:block;font-size:11px;font-weight:700;color:#8a5a14;margin-bottom:5px}
  .order-sec .ofld{width:100%;border:1px solid #e3d2b0;border-radius:8px;padding:9px 11px;font-family:inherit;font-size:13px;background:#fff}
  .order-sec .ofld:focus{outline:none;border-color:var(--amber)}
  .order-sec .onote{font-size:11px;color:#9c7c46;margin-top:10px;line-height:1.6}
  .gen-bar{padding:18px 20px;border-top:1px solid var(--paper-line);background:#fcfbf8}
  .btn{font-family:inherit;font-weight:700;font-size:14.5px;border:none;border-radius:11px;padding:13px 26px;cursor:pointer;letter-spacing:.02em;transition:.2s;display:inline-flex;align-items:center;justify-content:center;gap:9px;width:100%}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn-go{background:linear-gradient(160deg,var(--go),var(--go-deep));color:#fff;box-shadow:0 4px 14px rgba(45,125,90,.3)}
  .btn-go:not(:disabled):hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(45,125,90,.4)}
  .preview-wrap{position:sticky;top:20px}
  .ptabs{display:flex;gap:8px;margin-bottom:12px;align-items:center}
  .ptab{font-size:12px;font-weight:700;padding:6px 14px;border-radius:99px;border:1px solid var(--edge);background:#fff;color:var(--ink-soft);cursor:pointer;transition:.15s}
  .ptab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
  .ptab.disabled{opacity:.4;cursor:not-allowed}
  .ptab.order.on{background:var(--amber);border-color:var(--amber)}
  .pcaption{margin-left:auto;font-size:11.5px;color:#9a9486}
  .ringi{background:#fff;padding:30px 34px;box-shadow:var(--shadow-lg);border:1px solid var(--edge);font-family:'Shippori Mincho',serif;color:#1a1a1a;font-size:12px;max-height:74vh;overflow:auto}
  .ringi .rh{display:flex;justify-content:flex-end;font-size:10.5px;margin-bottom:4px;color:#444}
  .ringi .rtitle{text-align:center;font-size:19px;font-weight:700;letter-spacing:.5em;padding-left:.5em;border-bottom:3px double #222;padding-bottom:8px;margin-bottom:16px}
  .ringi .meta{display:flex;justify-content:space-between;margin-bottom:14px;font-size:11px;line-height:1.8}
  .ringi .kenmei{display:flex;border:2px solid #333;margin-bottom:15px}
  .ringi .kenmei .lbl{width:62px;background:#f0ece3;border-right:2px solid #333;display:grid;place-items:center;font-weight:700;font-size:12px;flex:none}
  .ringi .kenmei .val{padding:9px 13px;font-size:14px;font-weight:600;min-height:38px;display:flex;align-items:center}
  .ringi .kenmei .val.ph{color:#bbb;font-weight:400}
  .ringi .intro{margin-bottom:8px;font-size:11.5px}
  .ringi .ki{text-align:center;letter-spacing:.4em;margin:5px 0 13px;font-size:12px}
  .ringi .sec{margin-bottom:14px}
  .ringi .sec-t{font-weight:700;font-size:12px;margin-bottom:6px;border-left:4px solid var(--navy);padding-left:8px}
  .ringi .sec-b{padding-left:12px;font-size:11.5px;line-height:1.8;text-align:justify;white-space:pre-wrap}
  .ringi .sec-b.ph{color:#bbb}
  .ringi table{width:100%;border-collapse:collapse;font-size:10.5px;margin-left:5px}
  .ringi th{background:#f0ece3;border:1px solid #555;padding:5px 4px;font-weight:700}
  .ringi td{border:1px solid #777;padding:5px 6px}
  .ringi td.r{text-align:right}.ringi td.c{text-align:center}
  .ringi .tot td{background:#faf7f0;font-weight:700}
  .ringi .taxrow{text-align:right;font-size:10px;margin:4px 5px 0;color:#444}
  .ringi .plist{padding-left:12px;font-size:11.5px;line-height:1.9}
  .ringi .end{text-align:right;font-weight:700;margin-top:13px;font-size:11.5px}
  .ringi .foot{display:flex;justify-content:space-between;font-size:9.5px;color:#888;margin-top:7px;border-top:1px solid #ddd;padding-top:5px}
  .ringi .manual{color:#c08a3e;font-size:10.5px}
  .order-doc{background:#fff;padding:26px 30px;box-shadow:var(--shadow-lg);border:1px solid var(--edge);font-family:'Zen Kaku Gothic New',sans-serif;color:#1a1a1a;font-size:11px;max-height:74vh;overflow:auto}
  .order-doc .ot{text-align:center;font-size:20px;font-weight:900;letter-spacing:.6em;padding-left:.6em;margin-bottom:6px}
  .order-doc .od{text-align:right;font-size:10.5px;margin-bottom:10px;color:#444}
  .order-doc .ov{font-size:14px;font-weight:700;border-bottom:1px solid #333;display:inline-block;padding:0 30px 2px 4px;margin-bottom:14px}
  .order-doc .obox{display:grid;grid-template-columns:auto 1fr;border:1px solid #555;margin-bottom:3px}
  .order-doc .obox .k{background:#f0ece3;border-right:1px solid #555;padding:6px 10px;font-weight:700;font-size:10.5px;white-space:nowrap}
  .order-doc .obox .v{padding:6px 10px;font-size:11px}
  .order-doc table{width:100%;border-collapse:collapse;font-size:10px;margin-top:8px}
  .order-doc th{background:#f0ece3;border:1px solid #555;padding:4px;font-weight:700}
  .order-doc td{border:1px solid #777;padding:4px 6px;height:20px}
  .order-doc td.r{text-align:right}.order-doc td.c{text-align:center}
  .order-doc .neg{color:#c0392b}
  .order-doc .gt td{background:#faf7f0;font-weight:700}
  .order-doc .ono{text-align:right;font-size:10.5px;margin-bottom:4px}
  .toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;padding:12px 22px;border-radius:10px;font-size:13.5px;box-shadow:var(--shadow-lg);z-index:60;animation:up .3s}
  @keyframes up{from{opacity:0;transform:translate(-50%,12px)}}
  .err{margin:0 20px 18px;background:#fdecea;border:1px solid #f3c2bb;color:#a13325;border-radius:9px;padding:11px 14px;font-size:12.5px;white-space:pre-wrap}
  .tipbar{background:var(--go-soft);border:1px solid #bfe0cd;border-radius:10px;padding:11px 15px;font-size:12px;color:var(--go-deep);margin-bottom:20px;line-height:1.6}
</style>
</head>
<body>
<div class="boot" id="boot">
  <div class="boot-card"><div class="spin"></div><h2>稟議書ツールを準備中</h2>
    <p>書式保持エンジンを読み込んでいます。<br>初回のみ少し時間がかかります（10〜20秒ほど）。</p>
    <div class="pct" id="bootpct">0%</div><div class="bar"><i id="bootbar"></i></div></div>

<script id="py-logic" type="text/plain">"""
稟議書 Excel 生成 ― 既存テンプレートに値を流し込み、書式を完全保持する。

基準テンプレート: templates/ringi_template.xlsx (朝26139・品目3行版)
品目数に応じて、品目行 / 支払予定行 / 納期行を挿入・削除する。
罫線・セル結合・フォント(MS明朝)・数式・列幅などは元テンプレートのまま維持される。
"""

import os
from copy import copy
from datetime import datetime
import openpyxl
from openpyxl.utils import get_column_letter

TEMPLATE_BYTES = None  # set from JS

# --- 基準テンプレート(3品目版)の固定行番号 -----------------------------------
ROW_DATE = 3            # U3  申請日(西暦)
ROW_CONTACT = 10        # R10 連絡責任者
ROW_KENMEI = 12         # E12 件名
ROW_REASON = 24         # G24 起案理由(本文)
ROW_ITEM_HEAD = 30      # 品名/数量/単価/金額/発注先 見出し
ROW_ITEM_FIRST = 31     # 品目1行目
N_TEMPLATE_ITEMS = 3    # テンプレートの品目行数(31,32,33)
ROW_TOTAL = 34          # 合計
ROW_TAX = 35            # 別途消費税
ROW_PAY_TERM = 38       # F38 支払条件
ROW_PAY_FIRST = 40      # 支払予定1行目(40,41,42)
N_TEMPLATE_PAY = 3
ROW_DELIV_LABEL = 44    # B44 「4 納期」, F44 納期1行目
N_TEMPLATE_DELIV = 3    # 44,45,46
ROW_ATTACH = 55         # F55 添付資料
ROW_BESSHI = 58         # B58 別紙(n)枚

CIRCLED = ["①", "②", "③", "④", "⑤", "⑥", "⑦", "⑧", "⑨", "⑩"]


def _set(ws, row, col, value):
    """結合セルでも安全に値を設定(左上セルに書く)。"""
    from openpyxl.cell.cell import MergedCell
    cell = ws.cell(row=row, column=col)
    if isinstance(cell, MergedCell):
        # 属するマージ範囲の左上を探す
        for m in ws.merged_cells.ranges:
            if (m.min_row <= row <= m.max_row) and (m.min_col <= col <= m.max_col):
                ws.cell(row=m.min_row, column=m.min_col).value = value
                return
        return
    cell.value = value


def _copy_row_style(ws, src_row, dst_row, cols=range(1, 30)):
    """src_row の各セル書式を dst_row に複製(結合も含む)。"""
    for col in cols:
        s = ws.cell(row=src_row, column=col)
        d = ws.cell(row=dst_row, column=col)
        if s.has_style:
            d.font = copy(s.font)
            d.border = copy(s.border)
            d.fill = copy(s.fill)
            d.alignment = copy(s.alignment)
            d.number_format = s.number_format
            d.protection = copy(s.protection)
    ws.row_dimensions[dst_row].height = ws.row_dimensions[src_row].height


def _replicate_merges(ws, template_row, new_row):
    """template_row 上の結合範囲を new_row 上に同じ列幅で作成。"""
    ranges = [str(m) for m in ws.merged_cells.ranges]
    for rng in ranges:
        mc = openpyxl.worksheet.cell_range.CellRange(rng)
        if mc.min_row == template_row and mc.max_row == template_row:
            ws.merge_cells(
                start_row=new_row, end_row=new_row,
                start_column=mc.min_col, end_column=mc.max_col,
            )


def _unmerge_row(ws, row):
    for rng in [str(m) for m in ws.merged_cells.ranges]:
        mc = openpyxl.worksheet.cell_range.CellRange(rng)
        if mc.min_row == row and mc.max_row == row:
            ws.unmerge_cells(rng)


def generate(data: dict, out_path: str):
    """
    data 構造:
      kenmei: str
      reason: str
      items: [{name, qty, unit, price, vendor}]
      tax_rate: float
      pay_term: str
      pay_plan: [{label, ym}]
      delivery: [str]
      attach: str (任意)
      app_date: str (任意) "YYYY-MM-DD"。省略時は当日 → U3
      contact: str (任意) 連絡責任者名 → R10 (キー自体が無ければテンプレ既定のまま)
      quote_images: [str] (任意) 見積書PNGのbase64。"見積書"シートに縦に貼り付け
    """
    import io as _io
    wb = openpyxl.load_workbook(_io.BytesIO(TEMPLATE_BYTES))
    ws = wb["稟議書"]

    items = data.get("items", []) or [{}]
    n_items = len(items)
    pay_plan = data.get("pay_plan", []) or [{"label": "支払予定", "ym": ""}]
    delivery = data.get("delivery", []) or [""]

    # ====== 行数差を吸収(下のセクションから順に処理して行番号ズレを防ぐ) ======
    # 各ブロック1行分の結合列範囲(テンプレートから確定済み)
    ITEM_MERGES = [(3, 10), (11, 12), (14, 17), (18, 22), (23, 27)]  # C:J,K:L,N:Q,R:V,W:AA
    PAY_MERGES = [(11, 14)]   # K:N
    DELIV_MERGES = [(6, 10)]  # F:J

    # 1) 納期行の調整
    _adjust_block(ws, ROW_DELIV_LABEL, N_TEMPLATE_DELIV, len(delivery),
                  style_col_from=6, merge_spec=DELIV_MERGES)
    # 2) 支払予定行の調整
    _adjust_block(ws, ROW_PAY_FIRST, N_TEMPLATE_PAY, len(pay_plan),
                  style_col_from=6, merge_spec=PAY_MERGES)
    # 3) 品目行の調整(最上段)
    _adjust_block(ws, ROW_ITEM_FIRST, N_TEMPLATE_ITEMS, n_items,
                  style_col_from=3, merge_spec=ITEM_MERGES)

    # ====== ここから値を流し込む。行番号は調整後にずれているので再計算 ======
    item_shift = n_items - N_TEMPLATE_ITEMS
    pay_shift = len(pay_plan) - N_TEMPLATE_PAY
    # 各アンカーの調整後行
    r_total = ROW_TOTAL + item_shift
    r_tax = ROW_TAX + item_shift
    r_pay_term = ROW_PAY_TERM + item_shift
    r_pay_first = ROW_PAY_FIRST + item_shift
    r_deliv_label = ROW_DELIV_LABEL + item_shift + pay_shift
    r_attach = ROW_ATTACH + item_shift + pay_shift + (len(delivery) - N_TEMPLATE_DELIV)
    r_besshi = ROW_BESSHI + item_shift + pay_shift + (len(delivery) - N_TEMPLATE_DELIV)

    # --- ヘッダ: 申請日(西暦)・連絡責任者・件名・起案理由 ---
    _set(ws, ROW_DATE, 21, _parse_date(data.get("app_date")))  # U3
    if "contact" in data:
        contact = (data.get("contact") or "").strip()
        _set(ws, ROW_CONTACT, 18, f"（連絡責任者：　{contact}　）")  # R10
    _set(ws, ROW_KENMEI, 5, data.get("kenmei", ""))        # E12
    _set(ws, ROW_REASON, 7, data.get("reason", ""))        # G24

    # --- 品目 ---
    multi = n_items > 1
    for i, it in enumerate(items):
        r = ROW_ITEM_FIRST + i
        prefix = CIRCLED[i] if multi else ""
        _set(ws, r, 3, f"{prefix}{it.get('name','')}")        # C 品名
        _set(ws, r, 11, _num(it.get("qty")))                  # K 数量
        _set(ws, r, 13, it.get("unit", ""))                   # M 単位
        _set(ws, r, 14, _num(it.get("price")))                # N 単価
        _set(ws, r, 18, f"=N{r}*K{r}")                        # R 金額(数式)
        _set(ws, r, 23, it.get("vendor", ""))                 # W 発注先

    # --- 合計・消費税(数式で保持) ---
    _set(ws, r_total, 3, "合　　計")
    _set(ws, r_total, 18, f"=SUM(R{ROW_ITEM_FIRST}:V{ROW_ITEM_FIRST+n_items-1})")
    tax_rate = data.get("tax_rate", 0.10)
    _set(ws, r_tax, 18, f"=R{r_total}*{tax_rate}")

    # --- 支払条件 ---
    _set(ws, r_pay_term, 6, data.get("pay_term", ""))  # F
    multi_pay = len(pay_plan) > 1
    for i, p in enumerate(pay_plan):
        r = r_pay_first + i
        pre = CIRCLED[i] if multi_pay else ""
        _set(ws, r, 6, f"{pre}{p.get('label','支払予定')}")  # F
        _set(ws, r, 11, p.get("ym", ""))                      # K

    # --- 納期 ---
    multi_dlv = len(delivery) > 1
    for i, d in enumerate(delivery):
        r = r_deliv_label + i
        pre = CIRCLED[i] if multi_dlv else ""
        _set(ws, r, 6, f"{pre}{d}")  # F44...

    # --- 添付資料・別紙枚数 ---
    attach = data.get("attach") or f"御見積書{n_items if multi else 1}通"
    _set(ws, r_attach, 6, attach)
    _set(ws, r_besshi, 2, f"別紙（　{n_items}　）枚")

    # --- 見積書シートへ添付(PDF/画像→PNG化済み)を貼り付け ---
    quote_images = data.get("quote_images") or []
    if quote_images:
        _paste_quotes(wb, quote_images)

    wb.save(out_path)
    return out_path


def _parse_date(s):
    """'YYYY-MM-DD' を datetime に。無効・未指定なら当日。"""
    if s:
        try:
            return datetime.strptime(str(s)[:10], "%Y-%m-%d")
        except (ValueError, TypeError):
            pass
    return datetime.now()


def _paste_quotes(wb, images_b64):
    """
    アップロードされた見積書(PNG base64のリスト)を「見積書」シートに貼り付ける。
    1枚 = 印刷1ページになるよう、各画像に40行×18pt(=720pt)のブロックを割り当て、
    行高さで改ページ位置を設計的に固定する(A4縦・余白標準で1ページ=約734pt)。
    ※手動改ページ(rowBreaks)はビューアによって無視されるため併用に留める。
    依存: Pillow (Pyodideでは boot 時に loadPackage('Pillow') 済み)
    """
    import base64 as _b64
    import io as _io
    from openpyxl.drawing.image import Image as _XLImage
    from openpyxl.worksheet.pagebreak import Break as _Break
    from openpyxl.worksheet.page import PageMargins as _PM

    if "見積書" not in wb.sheetnames:
        return
    # 壊れた画像を除外してから配置(ブロック番号がずれないように)
    imgs = []
    for b in images_b64:
        try:
            raw = _b64.b64decode(b)
            imgs.append(_XLImage(_io.BytesIO(raw)))
        except Exception:
            continue
    if not imgs:
        return

    es = wb["見積書"]
    # 等倍印刷 + 標準余白(fit-to-page縮小は改ページ計算が崩れるため使わない)
    es.page_setup.scale = 100
    es.page_setup.fitToWidth = None
    es.page_setup.fitToHeight = None
    es.page_margins = _PM(left=0.7, right=0.7, top=0.75, bottom=0.75,
                          header=0.3, footer=0.3)

    BLOCK_ROWS = 40    # 1画像あたりの行数
    ROW_PT = 18.0      # 行高さ(pt)。40行×18pt=720pt ≦ 印刷可能高さ(約734pt)
    TARGET_W = 620     # px。等倍印刷でA4縦の印刷可能幅(約660px)に収まる
    TARGET_H = 940     # px(=705pt)。1ブロック(720pt=960px)に必ず収まる上限

    # 使用する全行の高さを先に設定(これで自然改ページが必ずブロック境界に揃う)
    total_rows = BLOCK_ROWS * len(imgs)
    for r in range(1, total_rows + 1):
        es.row_dimensions[r].height = ROW_PT

    for idx, img in enumerate(imgs):
        w = img.width or TARGET_W
        h = img.height or TARGET_H
        scale = min(TARGET_W / w, TARGET_H / h, 1.0)
        img.width = int(w * scale)
        img.height = int(h * scale)
        anchor_row = 1 + idx * BLOCK_ROWS
        if idx > 0:
            # Excelで開いた際の保険として手動改ページも入れておく
            es.row_breaks.append(_Break(id=anchor_row - 1))
        img.anchor = f"A{anchor_row}"
        es.add_image(img)

    # シートの使用範囲を最終行まで広げる(範囲外の改ページは無視されるため)
    es.cell(row=total_rows, column=1).value = " "

def _adjust_block(ws, first_row, template_count, target_count, style_col_from,
                  merge_spec=None):
    """
    first_row から template_count 行ある定型ブロックを target_count 行に合わせる。
    merge_spec: 1行分の結合列範囲リスト [(start_col,end_col),...]。
                指定時は挿入行にこのパターンを正確に適用する。
    """
    diff = target_count - template_count
    if diff == 0:
        return
    if diff > 0:
        insert_at = first_row + template_count  # ブロック直下に挿入
        # openpyxl の insert_rows は結合を自動調整しないため手動でシフト
        _shift_merges_down(ws, insert_at, diff)
        ws.insert_rows(insert_at, amount=diff)
        for k in range(diff):
            new_r = insert_at + k
            _copy_row_style(ws, first_row, new_r, cols=range(1, 30))
            if merge_spec is not None:
                for (sc, ec) in merge_spec:
                    ws.merge_cells(start_row=new_r, end_row=new_r,
                                   start_column=sc, end_column=ec)
            else:
                _replicate_merges(ws, first_row, new_r)
    else:
        remove_count = -diff
        for k in range(remove_count):
            row_to_del = first_row + template_count - 1 - k
            _unmerge_row(ws, row_to_del)
        _shift_merges_up(ws, first_row + target_count, remove_count)
        ws.delete_rows(first_row + target_count, amount=remove_count)


def _shift_merges_down(ws, at_row, amount):
    """at_row 以降(>=at_row)で始まる結合を amount 行ぶん下にずらす。"""
    moved = []
    for m in [openpyxl.worksheet.cell_range.CellRange(str(x)) for x in ws.merged_cells.ranges]:
        if m.min_row >= at_row:
            moved.append((m.min_row, m.min_col, m.max_row, m.max_col))
    for (r1, c1, r2, c2) in moved:
        ws.unmerge_cells(start_row=r1, start_column=c1, end_row=r2, end_column=c2)
    for (r1, c1, r2, c2) in moved:
        ws.merge_cells(start_row=r1 + amount, start_column=c1,
                       end_row=r2 + amount, end_column=c2)


def _shift_merges_up(ws, at_row, amount):
    """at_row 以降(>=at_row)で始まる結合を amount 行ぶん上にずらす。"""
    moved = []
    for m in [openpyxl.worksheet.cell_range.CellRange(str(x)) for x in ws.merged_cells.ranges]:
        if m.min_row >= at_row:
            moved.append((m.min_row, m.min_col, m.max_row, m.max_col))
    for (r1, c1, r2, c2) in moved:
        ws.unmerge_cells(start_row=r1, start_column=c1, end_row=r2, end_column=c2)
    for (r1, c1, r2, c2) in moved:
        ws.merge_cells(start_row=r1 - amount, start_column=c1,
                       end_row=r2 - amount, end_column=c2)


def _num(v):
    try:
        if v is None or v == "":
            return None
        f = float(v)
        return int(f) if f.is_integer() else f
    except (ValueError, TypeError):
        return v


# ===== 注文書モジュール =====
"""
注文書（100万円以上の添付資料）生成モジュール

クリーンな注文書テンプレート order_tpl_clean.xlsx に値を流し込む。
様式は明細21行固定の罫線フォーム。左=注文書、右=注文請書（同一内容）。
品名・数量・単位・単価・金額・合計・消費税・総合計・No.・日付・発注先・
見積番号・納期・納品場所・支払条件 を埋める。書式・結合・フォントは保持。
"""

import io
import os
from datetime import datetime
import openpyxl
from openpyxl.cell.cell import MergedCell

ORDER_TEMPLATE_BYTES = None  # Pyodideでセット。ローカルではパスから読む。
_ORDER_TPL_PATH = None

# ---- 注文書(左)側のアンカー ----
O_NO = ("L", 1)            # No.（稟議決済No.）
O_Y, O_M, O_D = ("J", 4), ("M", 4), ("O", 4)   # 年・月・日
O_VENDOR = ("A", 6)        # 発注先（御中の左）
O_AMOUNT = ("C", 17)       # 注文金額（総合計）
O_ESTNO = ("H", 17)        # 見積番号
O_DELIV = ("C", 18)        # 納期
O_PLACE = ("H", 18)        # 納品場所
O_PAYTERM = ("C", 19)      # 支払条件
O_ITEM_FIRST = 21          # 明細1行目
O_ITEM_LAST = 41           # 明細最終行（21行）
O_TOTAL = ("J", 42)        # 合計
O_TAX = ("J", 43)          # 消費税
O_GRAND = ("J", 44)        # 総合計
# 明細の列（注文書側）
O_COL_NAME = "A"
O_COL_QTY = "F"
O_COL_UNIT = "G"
O_COL_PRICE = "H"
O_COL_AMOUNT = "J"

# ---- 注文請書(右)側のアンカー ----
U_NO = ("AB", 1)
U_VENDOR = ("Q", 6)        # こちらは「カンロ株式会社」（自社が請ける側）→記入例に従い空でも可
U_AMOUNT = ("S", 17)
U_ESTNO = ("X", 17)
U_DELIV = ("S", 18)
U_PLACE = ("X", 18)
U_PAYTERM = ("S", 19)
U_TOTAL = ("Z", 42)
U_TAX = ("Z", 43)
U_GRAND = ("Z", 44)
U_COL_NAME = "Q"
U_COL_QTY = "V"
U_COL_UNIT = "W"
U_COL_PRICE = "X"
U_COL_AMOUNT = "Z"


def _oset(ws, col, row, value):
    """結合セルでも安全に値を設定。"""
    cell = ws[f"{col}{row}"]
    if isinstance(cell, MergedCell):
        for m in ws.merged_cells.ranges:
            if m.min_row <= cell.row <= m.max_row and m.min_col <= cell.column <= m.max_col:
                ws.cell(row=m.min_row, column=m.min_col).value = value
                return
        return
    cell.value = value


def _oload():
    if ORDER_TEMPLATE_BYTES is not None:
        return openpyxl.load_workbook(io.BytesIO(ORDER_TEMPLATE_BYTES))
    return openpyxl.load_workbook(_ORDER_TPL_PATH)


def generate_order(data: dict, out):
    """
    data:
      ringi_no: str         稟議決済No.（例: 朝26-47）
      vendor: str           発注先会社名
      est_no: str           見積番号
      delivery: str         納期（代表値。文字列）
      place: str            納品場所
      pay_term: str         支払条件
      items: [{name,qty,unit,price}]   ※発注先は注文書では不要
      tax_rate: float
      app_date: str (任意) "YYYY-MM-DD"。注文書の日付。省略時は当日
    out: ファイルパス or BytesIO
    """
    wb = _oload()
    ws = wb["注文書"]

    items = (data.get("items") or [])[:21]  # 21行まで
    tax_rate = data.get("tax_rate", 0.10)
    # 申請日(西暦)が指定されていればそれを使う。無ければ当日。
    today = datetime.now()
    _ad = data.get("app_date")
    if _ad:
        try:
            today = datetime.strptime(str(_ad)[:10], "%Y-%m-%d")
        except (ValueError, TypeError):
            pass

    def fill_side(NO, VENDOR, AMOUNT, ESTNO, DELIV, PLACE, PAYTERM,
                  TOTAL, TAX, GRAND, c_name, c_qty, c_unit, c_price, c_amount,
                  put_vendor=True):
        _oset(ws, NO[0], NO[1], data.get("ringi_no", ""))
        if put_vendor:
            _oset(ws, VENDOR[0], VENDOR[1], data.get("vendor", ""))
        _oset(ws, AMOUNT[0], AMOUNT[1], _grand_total(items, tax_rate))
        _oset(ws, ESTNO[0], ESTNO[1], data.get("est_no", ""))
        _oset(ws, DELIV[0], DELIV[1], data.get("delivery", ""))
        _oset(ws, PLACE[0], PLACE[1], data.get("place", "カンロ㈱朝日工場"))
        _oset(ws, PAYTERM[0], PAYTERM[1], data.get("pay_term", ""))
        # 明細
        for i, it in enumerate(items):
            r = O_ITEM_FIRST + i
            _oset(ws, c_name, r, it.get("name", ""))
            _oset(ws, c_qty, r, _onum(it.get("qty")))
            _oset(ws, c_unit, r, it.get("unit", ""))
            _oset(ws, c_price, r, _onum(it.get("price")))
            _oset(ws, c_amount, r, f"={c_price}{r}*{c_qty}{r}")
        # 合計・税・総合計（数式）
        _oset(ws, TOTAL[0], TOTAL[1],
             f"=SUM({c_amount}{O_ITEM_FIRST}:{c_amount}{O_ITEM_LAST})")
        _oset(ws, TAX[0], TAX[1], f"={TOTAL[0]}{TOTAL[1]}*{tax_rate}")
        _oset(ws, GRAND[0], GRAND[1], f"={TOTAL[0]}{TOTAL[1]}+{TAX[0]}{TAX[1]}")

    # 日付（年月日）は両側共通の独立セル
    _oset(ws, O_Y[0], O_Y[1], today.year)
    _oset(ws, O_M[0], O_M[1], today.month)
    _oset(ws, O_D[0], O_D[1], today.day)

    # 注文書（左）
    fill_side(O_NO, O_VENDOR, O_AMOUNT, O_ESTNO, O_DELIV, O_PLACE, O_PAYTERM,
              O_TOTAL, O_TAX, O_GRAND,
              O_COL_NAME, O_COL_QTY, O_COL_UNIT, O_COL_PRICE, O_COL_AMOUNT,
              put_vendor=True)
    # 注文請書（右）。発注先欄(Q6)は自社名が様式に応じ入る箇所なので空のまま。
    fill_side(U_NO, U_VENDOR, U_AMOUNT, U_ESTNO, U_DELIV, U_PLACE, U_PAYTERM,
              U_TOTAL, U_TAX, U_GRAND,
              U_COL_NAME, U_COL_QTY, U_COL_UNIT, U_COL_PRICE, U_COL_AMOUNT,
              put_vendor=False)

    wb.save(out)
    return out


def _onum(v):
    try:
        if v is None or v == "":
            return None
        f = float(v)
        return int(f) if f.is_integer() else f
    except (ValueError, TypeError):
        return v


def _grand_total(items, tax_rate):
    sub = sum((_onum(it.get("qty")) or 0) * (_onum(it.get("price")) or 0) for it in items)
    return int(round(sub * (1 + tax_rate)))

}
// 画像をPNG(base64)に正規化(幅1400px上限に縮小してファイル肥大を防ぐ)
function imageToPng(u){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>{const MAX=1400;const sc=Math.min(1,MAX/(im.naturalWidth||MAX));const c=document.createElement("canvas");c.width=Math.max(1,Math.round(im.naturalWidth*sc));c.height=Math.max(1,Math.round(im.naturalHeight*sc));c.getContext("2d").drawImage(im,0,0,c.width,c.height);res(c.toDataURL("image/png").split(",")[1])};im.onerror=()=>rej(new Error("画像の読み込みに失敗しました"));im.src=u.url;})}

function App(){
  const [apiKey,setApiKey]=useState(readKey());
  const [keyDraft,setKeyDraft]=useState(readKey());
  const [showSettings,setShowSettings]=useState(false);
  const hasKey=!!apiKey;

  const [kenmei,setKenmei]=useState("");
  const [reason,setReason]=useState("");
  const [appDate,setAppDate]=useState(todayISO());
  const [contact,setContact]=useState("阿部　良哉");
  const [items,setItems]=useState([blankItem()]);
  const [payTerm,setPayTerm]=useState("検収後20日締め、翌月15日現金振込み");
  const [payPlan,setPayPlan]=useState([{label:"支払予定",ym:""}]);
  const [delivery,setDelivery]=useState([""]);
  const [ringiNo,setRingiNo]=useState("");
  const [estNo,setEstNo]=useState("");
  const [place,setPlace]=useState("カンロ㈱朝日工場");
  // upload/extract
  const [ups,setUps]=useState([]);
  const [hot,setHot]=useState(false);
  const [extracting,setExtracting]=useState(false);
  const [aiFields,setAiFields]=useState({});
  const [busy,setBusy]=useState(false);
  const [rewriting,setRewriting]=useState(false);
  const [toast,setToast]=useState("");
  const [err,setErr]=useState("");
  const [tab,setTab]=useState("ringi");
  const showToast=m=>{setToast(m);setTimeout(()=>setToast(""),2600)};
  const upRef=React.useRef();

  const updItem=(i,k,v)=>setItems(p=>p.map((it,j)=>j===i?{...it,[k]:v}:it));
  const subtotal=useMemo(()=>items.reduce((s,it)=>s+(Number(it.qty)||0)*(Number(it.price)||0),0),[items]);
  const tax=Math.round(subtotal*0.10); const grand=subtotal+tax;
  const needOrder=grand>=THRESHOLD;
  const vendor0=items.find(it=>it.vendor.trim())?.vendor||"";
  const today=new Date();
  const dp=(appDate||todayISO()).split("-").map(Number);
  const dstr=`${dp[0]}年${dp[1]}月${dp[2]}日`;
  const canGen=kenmei.trim()&&items.some(it=>it.name.trim());

  const saveKey=()=>{try{localStorage.setItem(KEY_STORE,keyDraft.trim());setApiKey(keyDraft.trim());showToast("APIキーを保存しました。自動読み込みが使えます")}catch(e){showToast("保存に失敗しました")}};
  const clearKey=()=>{try{localStorage.removeItem(KEY_STORE);setApiKey("");setKeyDraft("");showToast("APIキーを削除しました。手動入力モードに戻ります")}catch(e){}};

  const addUploads=files=>{[...files].forEach(f=>{if(!f.type.startsWith("image/")&&f.type!=="application/pdf")return;const r=new FileReader();r.onload=()=>setUps(p=>[...p,{name:f.name,media:f.type,file:f,url:r.result}]);r.readAsDataURL(f)})};

  const markAI=(obj)=>{const m={};Object.keys(obj).forEach(k=>m[k]=true);setAiFields(m)};

  const extract=async()=>{
    if(!ups.length)return; setErr("");setExtracting(true);
    try{
      const content=[];
      for(const u of ups){
        if(u.media==="application/pdf"){
          content.push({type:"document",source:{type:"base64",media_type:"application/pdf",data:await fileToB64(u.file)}});
        }else{
          content.push({type:"image",source:{type:"base64",media_type:u.media,data:await fileToB64(u.file)}});
        }
      }
      content.push({type:"text",text:EXTRACT_PROMPT});
      const r=await fetch("https://api.anthropic.com/v1/messages",{
        method:"POST",
        headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:2000,messages:[{role:"user",content}]})
      });
      if(!r.ok){const t=await r.text();throw new Error("API応答エラー("+r.status+")\n"+t.slice(0,260));}
      const data=await r.json();
      let txt=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("");
      txt=txt.replace(/```json/g,"").replace(/```/g,"").trim();
      const s=txt.indexOf("{"),e=txt.lastIndexOf("}");
      if(s<0||e<0)throw new Error("抽出結果を解析できませんでした");
      const o=JSON.parse(txt.slice(s,e+1));
      if(o.kenmei) setKenmei(o.kenmei);
      if(o.reason) setReason(o.reason);
      if(Array.isArray(o.items)&&o.items.length) setItems(o.items.map(it=>({name:it.name||"",qty:String(it.qty??"1"),unit:it.unit||"式",price:it.price??"",vendor:it.vendor||""})));
      if(o.pay_term) setPayTerm(o.pay_term);
      if(Array.isArray(o.pay_plan)&&o.pay_plan.length) setPayPlan(o.pay_plan.map(p=>({label:p.label||"支払予定",ym:p.ym||""})));
      if(Array.isArray(o.delivery)&&o.delivery.length) setDelivery(o.delivery.map(String));
      if(o.est_no) setEstNo(o.est_no);
      markAI(o);
      showToast("見積書から自動入力しました。内容をご確認ください");
    }catch(e){ setErr("自動読み込みに失敗しました：\n"+(e.message||e)+"\n\n※ブラウザのセキュリティ(CORS)で外部APIが拒否される場合があります。その場合は手動入力をご利用ください。"); }
    setExtracting(false);
  };

  const rewriteReason=async()=>{
    if(!hasKey){showToast("APIキーを設定すると使えます");return;}
    setRewriting(true);
    try{
      const items_txt=items.map(it=>`${it.name}(${it.qty}${it.unit})`).join("、");
      const prompt=`あなたは製造業（食品工場）設備管理部門の稟議書起草担当です。件名「${kenmei}」、対象品目「${items_txt}」について、決裁者が論理的に納得できる起案理由を作成してください。\n(1)背景・現状 (2)必要性とリスク (3)結論 の3段構成で3〜5文。冒頭は全角スペース1つ。丁寧な敬体で事実と論理で説得。起案理由の本文のみ出力し、説明や見出しは付けない。`;
      const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",
        headers:{"content-type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
        body:JSON.stringify({model:MODEL,max_tokens:800,messages:[{role:"user",content:prompt}]})});
      if(!r.ok)throw new Error();
      const data=await r.json();
      let t=(data.content||[]).filter(b=>b.type==="text").map(b=>b.text).join("").trim();
      if(t&&!t.startsWith("　"))t="　"+t;
      if(t){setReason(t);showToast("起案理由を作り直しました");}
    }catch(e){showToast("作り直しに失敗しました");}
    setRewriting(false);
  };

  const buildData=()=>({kenmei,reason,app_date:appDate,contact,items:items.map(it=>({name:it.name,qty:Number(it.qty)||0,unit:it.unit,price:Number(it.price)||0,vendor:it.vendor})),tax_rate:0.10,pay_term:payTerm,pay_plan:payPlan.map(p=>({label:p.label,ym:p.ym})),delivery});
  // アップロード(PDF/画像)をすべてPNG(base64)に変換 → 見積書シート貼り付け用
  const collectQuoteImages=async()=>{
    const arr=[];
    for(const u of ups){
      if(u.media==="application/pdf"){(await pdfToPngs(u.file)).forEach(b=>arr.push(b));}
      else{arr.push(await imageToPng(u));}
    }
    return arr;
  };
  const runPy=async(varName,payload,fnCall)=>{pyodideGlobal.globals.set(varName,JSON.stringify(payload));const b64=await pyodideGlobal.runPythonAsync(fnCall);const bin=atob(b64);const bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return bytes;};
  const dl=(blob,name)=>{const u=URL.createObjectURL(blob);const a=document.createElement("a");a.href=u;a.download=name;a.click();URL.revokeObjectURL(u);};

  const generate=async()=>{
    setErr("");setBusy(true);
    try{
      await pyReady;
      if(!window.__PY_OK__)throw new Error("エンジンが未準備です。少し待って再度お試しください。");
      const safe=(kenmei||"稟議書").replace(/[\\/:*?"<>|]/g,"_");
      let qimgs=[];
      if(ups.length){
        try{qimgs=await collectQuoteImages();}
        catch(e){throw new Error("添付の変換に失敗しました："+(e.message||e));}
      }
      const ringiPayload={...buildData(),quote_images:qimgs};
      const ringiBytes=await runPy("RINGI_JSON",ringiPayload,`
import json,io,base64
_d=json.loads(RINGI_JSON);_b=io.BytesIO();generate(_d,_b)
base64.b64encode(_b.getvalue()).decode()`);
      if(needOrder){
        const orderPayload={ringi_no:ringiNo,vendor:vendor0,est_no:estNo,delivery:(delivery[0]||""),place,pay_term:payTerm,items:buildData().items,tax_rate:0.10,app_date:appDate};
        const orderBytes=await runPy("ORDER_JSON",orderPayload,`
import json,io,base64
_o=json.loads(ORDER_JSON);_b=io.BytesIO();generate_order(_o,_b)
base64.b64encode(_b.getvalue()).decode()`);
        const zip=new JSZip();
        zip.file("稟議書_"+safe+".xlsx",ringiBytes);
        zip.file("注文書_"+safe+".xlsx",orderBytes);
        const blob=await zip.generateAsync({type:"blob"});
        dl(blob,"稟議書一式_"+safe+".zip");
        showToast("稟議書＋注文書をダウンロードしました");
      }else{
        dl(new Blob([ringiBytes],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}),"稟議書_"+safe+".xlsx");
        showToast("Excelをダウンロードしました（書式そのまま）");
      }
    }catch(e){setErr("生成に失敗しました："+(e.message||e));}
    setBusy(false);
  };

  return <div>
    <div className="top"><div className="wrap">
      <div className="mark">稟</div>
      <div><h1>稟議書 作成ツール</h1><p>社内テンプレート書式のまま Excel 出力</p></div>
      <div className="right">
        <span className="badge">設備管理チーム</span>
        <button className={"gear"+(showSettings?" active":"")} onClick={()=>setShowSettings(s=>!s)} title="設定">
          {hasKey&&<span className="dot"></span>}
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
      </div>
    </div></div>

    <main><div className="wrap">
      {showSettings && <div className="settings">
        <div className="settings-h">
          <span className="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/></svg></span>
          <h3>設定 ― 自動読み込み（AI）</h3>
          <button className="x" onClick={()=>setShowSettings(false)}>×</button>
        </div>
        <div className="settings-b">
          <div className={"keystate "+(hasKey?"on":"off")}>
            {hasKey?<>● 自動読み込み：有効（APIキー設定済み）</>:<>○ 自動読み込み：無効（手動入力モード）</>}
          </div>
          <div className="modeswitch">
            <div className={"modecard"+(!hasKey?" on":"")}>
              <div className="mt">手動入力モード {!hasKey&&<span className="pill">現在</span>}</div>
              <p>各項目を自分で入力。課金・APIキー不要。ネット接続だけで動作。</p>
            </div>
            <div className={"modecard"+(hasKey?" on":"")}>
              <div className="mt">自動読み込みモード {hasKey&&<span className="pill">現在</span>}</div>
              <p>見積書/注文書をアップロードするとAIが項目を自動入力。APIキーが必要（従量課金）。</p>
            </div>
          </div>
          <div className="keyrow">
            <label>Anthropic APIキー</label>
            <div className="keyinput">
              <input type="password" placeholder="sk-ant-..." value={keyDraft} onChange={e=>setKeyDraft(e.target.value)} />
              <button className="ksave" onClick={saveKey}>保存</button>
              {hasKey&&<button className="kclear" onClick={clearKey}>削除</button>}
            </div>
            <div className="keynote">
              <b>キーはこのブラウザ内だけに保存</b>され、Anthropic以外には送信されません（保存先：localStorage）。空のままなら手動入力モードのままです。いつでも保存・削除でき、削除すれば自動読み込み機能は消えて手動モードに戻ります。<br/>
              ※ブラウザから直接APIを呼ぶため、セキュリティ(CORS)で拒否される環境ではこの機能が動かないことがあります。その場合も手動入力は常に利用できます。
            </div>
          </div>
        </div>
      </div>}

      <div className="tipbar">
        各項目を入力すると右側に仕上がりが表示されます。「Excelを作成」で社内フォーマット（罫線・MS明朝・数式すべて保持）の稟議書をダウンロード。<b>総額100万円以上で注文書も作成対象</b>になります。　見積書（PDF・画像）を添付すると、Excelの2ページ目「見積書」シートに自動で貼り付きます。{hasKey?<>　<b style={{color:"#4a3d73"}}>自動読み込みが有効です。</b>添付した見積書から項目を自動入力できます。</>:<>　右上の歯車からAPIキーを設定すると、見積書からの自動入力も使えます。</>}
      </div>

      <div className="layout">
        <div className="card">
          <div className="card-h"><span className="step">1</span><h3>稟議書の内容{hasKey?"（自動入力 or 手動）":"を入力"}</h3><span className="hint">＊が付く項目は必須</span></div>

          <div>
            {!extracting ? <div className={"uploadzone"+(hot?" hot":"")} onClick={()=>upRef.current.click()}
              onDragOver={e=>{e.preventDefault();setHot(true)}} onDragLeave={()=>setHot(false)}
              onDrop={e=>{e.preventDefault();setHot(false);addUploads(e.dataTransfer.files)}}>
              <div className="ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg></div>
              <h4>{hasKey?"見積書をアップロード（自動入力＋Excelに添付）":"見積書をアップロード（Excelに添付）"}</h4>
              <div className="sub">ドラッグ＆ドロップ、またはクリックして選択（PDF・JPG・PNG）<br/>添付したファイルは生成されるExcelの2ページ目「見積書」シートに自動で貼り付きます{hasKey?"":"。AIによる自動入力は右上の歯車からAPIキーを設定すると使えます"}</div>
              <span className="badge2">{hasKey?"AI自動読み込み＋貼り付け":"見積書シートへ貼り付け"}</span>
              <input ref={upRef} type="file" accept="image/*,application/pdf" multiple hidden onChange={e=>addUploads(e.target.files)} />
              {ups.length>0&&<div className="uthumbs" onClick={e=>e.stopPropagation()}>
                {ups.map((u,i)=><div className="uthumb" key={i}>
                  <button className="x" onClick={()=>setUps(p=>p.filter((_,j)=>j!==i))}>×</button>
                  {u.media==="application/pdf"?<div className="pdf">PDF</div>:<img src={u.url} alt="" />}
                </div>)}
              </div>}
              {ups.length>0&&hasKey&&<div className="uact" onClick={e=>e.stopPropagation()}>
                <button className="btn-extract" onClick={extract} disabled={extracting}>
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M12 2v4M12 18v4M4.9 4.9l2.8 2.8M16.3 16.3l2.8 2.8M2 12h4M18 12h4"/></svg>
                  AIで自動入力する
                </button>
              </div>}
            </div> : <div className="uploadzone"><div className="extracting"><span className="miniSpin"></span>見積書を読み取り、項目を抽出しています…</div></div>}
          </div>

          <div className="form">
            <div className="fg"><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <div><label>申請日（西暦）</label>
                <input className="fld" type="date" value={appDate} onChange={e=>setAppDate(e.target.value)} /></div>
              <div><label>連絡責任者</label>
                <input className="fld" value={contact} placeholder="例：阿部　良哉" onChange={e=>setContact(e.target.value)} /></div>

            <div className="fg"><label>件名 ＊{aiFields.kenmei&&<span className="src">AI</span>}</label>
              <input className="fld" value={kenmei} placeholder="例：新ラインロータリーポンプ交換" onChange={e=>setKenmei(e.target.value)} /></div>
            <div className="fg"><label>1　起案理由{aiFields.reason&&<span className="src">AI</span>}</label>
              <textarea className="fld" value={reason} placeholder="なぜこの購入・修理が必要かを記入します。" onChange={e=>setReason(e.target.value)} />
              {hasKey&&<div className="reasontools"><button className="relink" disabled={rewriting} onClick={rewriteReason}>

                {rewriting?"作成中…":"起案理由を作り直す（AI）"}</button></div>}

              {items.map((it,i)=><div className="item" key={i}>
                {items.length>1&&<button className="delrow" onClick={()=>setItems(p=>p.filter((_,j)=>j!==i))}>×</button>}
                <div className="stack">
                  <div><span className="mini">品名</span><input className="fld" value={it.name} placeholder="品名を入力" onChange={e=>updItem(i,"name",e.target.value)} /></div>
                  <div className="row3">
                    <div><span className="mini">数量</span><input className="fld" value={it.qty} onChange={e=>updItem(i,"qty",e.target.value)} /></div>
                    <div><span className="mini">単位</span><input className="fld" value={it.unit} onChange={e=>updItem(i,"unit",e.target.value)} /></div>

              <div className="sumline">

            {needOrder && <div className="order-sec">
              <div className="osh">
                <span className="ic"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></span>
                <span className="t">注文書の追加情報（100万円以上）</span><span className="tag">注文書も作成されます</span></div>
              <div className="osb">
                <div className="ogrid">
                  <div><label>稟議決済No.</label><input className="ofld" value={ringiNo} placeholder="例：朝26-47" onChange={e=>setRingiNo(e.target.value)} /></div>
                  <div><label>見積番号{aiFields.est_no&&<span className="src" style={{background:"var(--amber)"}}>AI</span>}</label><input className="ofld" value={estNo} placeholder="例：25B0120" onChange={e=>setEstNo(e.target.value)} /></div>
                  <div><label>発注先（品目から自動）</label><input className="ofld" value={vendor0} disabled style={{background:"#f3efe6",color:"#8a7a55"}} /></div>
                  <div><label>納品場所</label><input className="ofld" value={place} onChange={e=>setPlace(e.target.value)} /></div>
                </div>
                <div className="onote">注文書の品名・数量・単価・金額・支払条件・納期は稟議書の入力がそのまま使われ、注文書と注文請書が1枚に並ぶ社内様式で出力されます。</div>
              </div>
            </div>}

            <div className="fg" style={{marginTop:18}}><label>3　支払条件{aiFields.pay_term&&<span className="src">AI</span>}</label>
              <input className="fld" value={payTerm} onChange={e=>setPayTerm(e.target.value)} />
              <div className="rowset" style={{marginTop:9}}>
                {payPlan.map((p,i)=><div className="row2" key={i}>
                  <input className="fld" value={p.label} onChange={e=>setPayPlan(x=>x.map((y,j)=>j===i?{...y,label:e.target.value}:y))} />
                  <input className="fld" value={p.ym} placeholder="支払月（例：2026年5月）" onChange={e=>setPayPlan(x=>x.map((y,j)=>j===i?{...y,ym:e.target.value}:y))} />
                  {payPlan.length>1&&<button className="delmini" onClick={()=>setPayPlan(x=>x.filter((_,j)=>j!==i))}>×</button>}
                </div>)}
                <button className="addmini" onClick={()=>setPayPlan(x=>[...x,{label:"支払予定",ym:""}])}>＋ 支払予定を追加</button>
              </div>
            </div>
            <div className="fg"><label>4　納期{aiFields.delivery&&<span className="src">AI</span>}</label>
              <div className="rowset">
                {delivery.map((d,i)=><div className="row1" key={i}>
                  <input className="fld" value={d} placeholder="例：2026年7月 / 1週間程度" onChange={e=>setDelivery(x=>x.map((y,j)=>j===i?e.target.value:y))} />
                  {delivery.length>1&&<button className="delmini" onClick={()=>setDelivery(x=>x.filter((_,j)=>j!==i))}>×</button>}
                </div>)}
                <button className="addmini" onClick={()=>setDelivery(x=>[...x,""])}>＋ 納期を追加</button>
              </div>
            </div>
          </div>
          {err&&<div className="err">{err}</div>}
          <div className="gen-bar">
            <button className="btn btn-go" disabled={!canGen||busy} onClick={generate}>
              {busy?"生成中…":<>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                {needOrder?"稟議書＋注文書を作成（ZIP）":"Excelを作成（書式そのまま）"}</>}
            </button>
          </div>
        </div>

        <div className="preview-wrap">
          <div className="ptabs">
            <button className={"ptab"+(tab==="ringi"?" on":"")} onClick={()=>setTab("ringi")}>稟議書</button>
            <button className={"ptab order"+(tab==="order"?" on":"")+(needOrder?"":" disabled")} onClick={()=>needOrder&&setTab("order")}>注文書 {needOrder?"":"（100万以上で表示）"}</button>
            <span className="pcaption">入力すると仕上がりが表示されます</span>
          </div>
          {tab==="ringi" && <div className="ringi">
            <div className="rh">（西暦）{dstr}</div>
            <div className="rtitle">稟議書</div>
            <div className="meta"><div>宛先：　山本工場長</div>
              <div>部署：　設備管理ﾁｰﾑﾘｰﾀﾞｰ<br/>氏名：　水本　博之<br/><span style={{fontSize:10}}>（連絡責任者：　{contact||"　"}　）</span></div></div>
            <div className="kenmei"><div className="lbl">件名</div><div className={"val"+(kenmei?"":" ph")}>{kenmei||"（件名を入力）"}</div></div>
            <div className="intro">標記の件、下記の内容にて稟議申請致します。</div>
            <div className="ki">記</div>
            <div className="sec"><div className="sec-t">１　起案理由</div><div className={"sec-b"+(reason?"":" ph")}>{reason||"（起案理由を入力）"}</div></div>
            <div className="sec"><div className="sec-t">２　品名・数量・金額・発注先</div>
              <table><thead><tr><th>品名</th><th style={{width:"15%"}}>数量</th><th style={{width:"17%"}}>単価</th><th style={{width:"18%"}}>金額</th><th style={{width:"20%"}}>発注先</th></tr></thead>
                <tbody>{items.map((it,i)=>{const amt=(Number(it.qty)||0)*(Number(it.price)||0);const multi=items.length>1;return(
                  <tr key={i}><td>{multi?CIRCLED[i]:""}{it.name||<span style={{color:"#ccc"}}>（品名）</span>}</td>
                    <td className="c">{it.qty} {it.unit}</td><td className="r">{it.price?Number(it.price).toLocaleString("ja-JP"):"—"}</td>
                    <td className="r">{amt?amt.toLocaleString("ja-JP"):"—"}</td><td className="c">{it.vendor||<span style={{color:"#ccc"}}>（発注先）</span>}</td></tr>)})}
                  <tr className="tot"><td className="c">合　　計</td><td></td><td></td><td className="r">{subtotal.toLocaleString("ja-JP")}</td><td></td></tr>
                </tbody></table>
              <div className="taxrow">(別途消費税 {tax.toLocaleString("ja-JP")} )</div></div>
            <div className="sec"><div className="sec-t">３　支払条件</div>
              <div className="sec-b">{payTerm}<div className="plist">{payPlan.map((p,i)=><div key={i}>{payPlan.length>1?CIRCLED[i]:""}{p.label}：{p.ym||"（支払月）"}</div>)}</div></div></div>
            <div className="sec"><div className="sec-t">４　納期</div><div className="plist sec-b">{delivery.map((d,i)=><div key={i}>{delivery.length>1?CIRCLED[i]:""}{d||"（納期）"}</div>)}</div></div>
            <div className="sec"><div className="sec-t">５　計画区分</div><div className="sec-b manual">※Excelで開いた後に手入力</div></div>
            <div className="sec"><div className="sec-t">６　設置個所</div><div className="sec-b manual">※Excelで開いた後に手入力</div></div>
            <div className="sec"><div className="sec-t">７　添付資料</div><div className="sec-b">御見積書{items.length>1?items.length:1}通{needOrder?"　／　注文書1通":""}{ups.length>0&&<div style={{fontSize:10,color:"#8a7aa0",marginTop:3}}>※添付{ups.length}件を2ページ目「見積書」シートに貼り付け</div>}</div></div>
            <div className="end">以上</div>
            <div className="foot"><span>別紙（　{items.length}　）枚</span><span>※2016年11月9日改定</span></div>
          </div>}
          {tab==="order" && needOrder && <div className="order-doc">
            <div className="ono">No.　{ringiNo||"（稟議決済No.）"}</div>
            <div className="ot">注 文 書</div>
            <div className="od">{dp[0]} 年 {dp[1]} 月 {dp[2]} 日</div>
            <div className="ov">{vendor0||"（発注先）"}　御中</div>
            <div style={{fontSize:10.5,marginBottom:10}}>　下記の内容にて注文致します。</div>
            <div className="obox"><div className="k">注文金額</div><div className="v" style={{fontWeight:700}}>{yen(grand)}</div></div>
            <div className="obox"><div className="k">見積番号</div><div className="v">{estNo||"—"}</div></div>
            <div className="obox"><div className="k">納　期</div><div className="v">{delivery[0]||"—"}</div></div>
            <div className="obox"><div className="k">納品場所</div><div className="v">{place}</div></div>
            <div className="obox"><div className="k">支払条件</div><div className="v">{payTerm}</div></div>
            <table><thead><tr><th>品　名</th><th style={{width:"12%"}}>数量</th><th style={{width:"10%"}}>単位</th><th style={{width:"20%"}}>単　価</th><th style={{width:"22%"}}>金　額</th></tr></thead>
              <tbody>{items.map((it,i)=>{const amt=(Number(it.qty)||0)*(Number(it.price)||0);const neg=amt<0;return(
                <tr key={i}><td>{it.name||<span style={{color:"#ccc"}}>（品名）</span>}</td>
                  <td className="c">{it.qty}</td><td className="c">{it.unit}</td>
                  <td className={"r"+(Number(it.price)<0?" neg":"")}>{it.price!==""?Number(it.price).toLocaleString("ja-JP"):"—"}</td>
                  <td className={"r"+(neg?" neg":"")}>{amt?(neg?"("+Math.abs(amt).toLocaleString("ja-JP")+")":amt.toLocaleString("ja-JP")):"—"}</td></tr>)})}
                {Array.from({length:Math.max(0,4-items.length)}).map((_,i)=><tr key={"e"+i}><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>)}
                <tr className="gt"><td className="c">合　計</td><td></td><td></td><td></td><td className="r">{subtotal.toLocaleString("ja-JP")}</td></tr>
                <tr className="gt"><td className="c">（消費税）</td><td></td><td></td><td></td><td className="r">{tax.toLocaleString("ja-JP")}</td></tr>
                <tr className="gt"><td className="c">総合計</td><td></td><td></td><td></td><td className="r">{grand.toLocaleString("ja-JP")}</td></tr>
              </tbody></table>
            <div style={{fontSize:10,color:"#888",marginTop:8}}>※実際の出力では、右側に注文請書（控え）が並びます。</div>
          </div>}
        </div>
      </div>
    </div></main>
    {toast&&<div className="toast">{toast}</div>}
  </div>;
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
